services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:?Please set TELEGRAM_API_ID in .env}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:?Please set TELEGRAM_API_HASH in .env}
      - TELEGRAM_LOCAL=1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TELEGRAM_API_URL=${TELEGRAM_API_URL:-http://telegram-bot-api:8081}
    depends_on:
      - telegram-bot-api
    volumes:
      - downloads:/tmp/ytdlp_bot_downloads

volumes:
  downloads:
  telegram-bot-api-data:
